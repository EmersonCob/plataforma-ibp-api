services:
  api:
    image: ${BACKEND_IMAGE:-plataforma-ibp-backend:latest}
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PROJECT_NAME: ${PROJECT_NAME:-Plataforma IBP}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      PUBLIC_SIGN_URL_BASE: ${PUBLIC_SIGN_URL_BASE:-https://ibp-web-qa.jbtechinnova.com/assinatura}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://ibp-web-qa.jbtechinnova.com}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio-infra-qa.jbtechinnova.com}
      S3_SECURE: ${S3_SECURE:-true}
      S3_BUCKET: ${S3_BUCKET:-plataforma-ibp}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PRESIGNED_EXPIRES_SECONDS: ${S3_PRESIGNED_EXPIRES_SECONDS:-900}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-8}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-8/minute}
      PUBLIC_RATE_LIMIT: ${PUBLIC_RATE_LIMIT:-30/minute}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      BOOTSTRAP_DEFAULT_TEMPLATE: ${BOOTSTRAP_DEFAULT_TEMPLATE:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
