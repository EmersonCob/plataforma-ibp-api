user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    include /etc/nginx/conf.d/*.conf;

    upstream plataforma_ibp_api_app {
        server plataforma_ibp_api:8000;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=public_zone:10m rate=30r/s;

    server {
        listen 80;
        server_name ibp-api-qa.jbtechinnova.com;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        proxy_connect_timeout   5s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;
        client_max_body_size    50m;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_http_version 1.1;

        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass http://plataforma_ibp_api_app;
        }

        location /api/v1/public/ {
            limit_req zone=public_zone burst=60 nodelay;
            proxy_pass http://plataforma_ibp_api_app;
        }

        location / {
            proxy_pass http://plataforma_ibp_api_app;
        }
    }
}
